name: release

# Workflow de release semântico usando release-please.
#
# Como funciona:
#   1. Quando acionado manualmente, este workflow analisa os commits seguindo o padrão
#      Conventional Commits e abre (ou atualiza) um PR de release.
#   2. Quando o PR de release é mergeado, cria a tag vX.Y.Z e a GitHub Release.
#
# Tipos de commit e impacto na versão:
#   feat:           → bumpa MINOR  (ex.: feat: add fuzzy search endpoint)
#   fix:            → bumpa PATCH  (ex.: fix: catalog cache miss on warm start)
#   feat!: ou       → bumpa MAJOR  (ex.: feat!: replace RabbitMQ with SQS)
#   BREAKING CHANGE
#   docs:/chore:    → sem bump de versão
#
# O workflow fica disponível apenas no botão Run workflow.

on:
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          release-type: simple
