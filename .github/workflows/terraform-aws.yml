name: terraform-aws

# Requer:
#  - secret  AWS_GITHUB_ROLE_ARN      (output do stack bootstrap)
#  - variable TF_STATE_BUCKET         (output do stack bootstrap)
#  - variable TF_LOCK_TABLE           (output do stack bootstrap)
#  - variable GITOPS_REPO_URL         (https://github.com/<org>/Fase4-FCG-Orchestrator.git)
#  - branch alvo: master
# Opcional:
#  - environment "prod" com required reviewers para gate manual antes do apply

on:
  pull_request:
    paths:
      - "infra/terraform/aws/**"
      - "deploy/helm/fcg-platform/Chart.yaml"
      - "deploy/helm/fcg-platform/values.yaml"
      - "deploy/helm/fcg-platform/templates/**"
      - ".github/workflows/terraform-aws.yml"
  push:
    branches: [master]
    paths:
      - "infra/terraform/aws/**"
      - "deploy/helm/fcg-platform/Chart.yaml"
      - "deploy/helm/fcg-platform/values.yaml"
      - "deploy/helm/fcg-platform/templates/**"
      - ".github/workflows/terraform-aws.yml"
  workflow_dispatch:

permissions:
  contents: write
  id-token: write

env:
  AWS_REGION: us-east-1
  TF_WORKING_DIR: infra/terraform/aws
  TF_STATE_KEY: aws/prod/terraform.tfstate
  HELM_CHART_DIR: deploy/helm/fcg-platform
  AWS_ROLE_DURATION_SECONDS: 21600

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup Helm
        uses: azure/setup-helm@b9e51907a09c216f16ebe8536097933489208112 # v4.3.0

      - name: Helm lint
        run: helm lint ${{ env.HELM_CHART_DIR }}

      - name: Helm template (dry-run)
        run: |
          helm template fcg-platform ${{ env.HELM_CHART_DIR }} \
            -f ${{ env.HELM_CHART_DIR }}/values.yaml \
            --debug > /dev/null

  plan:
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd # v3.1.2

      - name: Configure AWS credentials (bootstrap session)
        uses: aws-actions/configure-aws-credentials@e3dd6a429d7300a6a4c196c26e071d42e0343502 # v4.0.2
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: ${{ secrets.AWS_GITHUB_ROLE_ARN }}

      - name: Ensure GitHub Actions role supports long Terraform sessions
        run: |
          ROLE_ARN="${{ secrets.AWS_GITHUB_ROLE_ARN }}"
          ROLE_NAME="${ROLE_ARN##*/}"
          aws iam update-role \
            --role-name "${ROLE_NAME}" \
            --max-session-duration "${{ env.AWS_ROLE_DURATION_SECONDS }}"
          sleep 10

      - name: Configure AWS credentials (long Terraform session)
        uses: aws-actions/configure-aws-credentials@e3dd6a429d7300a6a4c196c26e071d42e0343502 # v4.0.2
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: ${{ secrets.AWS_GITHUB_ROLE_ARN }}
          role-duration-seconds: ${{ env.AWS_ROLE_DURATION_SECONDS }}

      - name: Terraform fmt
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform fmt -check -recursive

      - name: Terraform init
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: |
          terraform init -input=false \
            -backend-config="bucket=${{ vars.TF_STATE_BUCKET }}" \
            -backend-config="key=${{ env.TF_STATE_KEY }}" \
            -backend-config="region=${{ env.AWS_REGION }}" \
            -backend-config="use_lockfile=true" \
            -backend-config="encrypt=true"

      - name: Terraform validate
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform validate

      - name: Liberar state lock do plan (se existir de run anterior)
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: |
          # S3 native lock: o arquivo é <state_key>.tflock
          LOCK_FILE="s3://${{ vars.TF_STATE_BUCKET }}/${{ env.TF_STATE_KEY }}.tflock"
          if aws s3 ls "${LOCK_FILE}" 2>/dev/null; then
            echo "Lock file encontrado: ${LOCK_FILE}"
            LOCK_ID=$(aws s3 cp "${LOCK_FILE}" - 2>/dev/null \
              | python3 -c "import sys,json; print(json.load(sys.stdin).get('ID',''))" 2>/dev/null || echo "")
            if [[ -n "${LOCK_ID}" ]]; then
              echo "Forçando liberação do lock: ${LOCK_ID}"
              terraform force-unlock -force "${LOCK_ID}" || true
            else
              echo "Deletando lock file diretamente..."
              aws s3 rm "${LOCK_FILE}" || true
            fi
            echo "✓ Lock liberado."
          else
            echo "Nenhum lock ativo. Prosseguindo."
          fi

      - name: Limpar secrets pendentes de deleção
        run: |
          set -euo pipefail

          secrets=(
            "fcg/prod/users-api"
            "fcg/prod/catalog-api"
            "fcg/prod/payments-api"
            "fcg/prod/notifications-api"
            "fcg/prod/rabbitmq"
            "fcg/prod/postgres-bootstrap"
          )

          for secret in "${secrets[@]}"; do
            deleted_date=$(aws secretsmanager describe-secret \
              --secret-id "${secret}" \
              --query "DeletedDate" \
              --output text 2>/dev/null || true)

            if [[ -n "${deleted_date}" && "${deleted_date}" != "None" ]]; then
              echo "Secret ${secret} está pendente de deleção. Removendo imediatamente para recriação pelo Terraform..."
              if ! aws secretsmanager delete-secret \
                --secret-id "${secret}" \
                --force-delete-without-recovery; then
                echo "Forçando recuperação temporária de ${secret} antes da remoção imediata..."
                aws secretsmanager restore-secret --secret-id "${secret}" || true
                aws secretsmanager delete-secret \
                  --secret-id "${secret}" \
                  --force-delete-without-recovery
              fi

              for attempt in {1..30}; do
                if aws secretsmanager describe-secret --secret-id "${secret}" >/dev/null 2>&1; then
                  sleep 2
                else
                  break
                fi
              done
            fi
          done

      - name: Terraform plan
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform plan -input=false -lock=false -var-file=environments/prod.tfvars -out=tfplan

      - name: Upload plan artifact
        uses: actions/upload-artifact@4cec3d8aa04e39d1a68397de0c4cd6fb9dce8ec1 # v4.6.1
        with:
          name: terraform-aws-plan
          path: ${{ env.TF_WORKING_DIR }}/tfplan

  apply:
    needs: plan
    if: github.event_name == 'push' && github.ref == 'refs/heads/master' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    environment: prod
    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd # v3.1.2

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Configure AWS credentials (bootstrap session)
        uses: aws-actions/configure-aws-credentials@e3dd6a429d7300a6a4c196c26e071d42e0343502 # v4.0.2
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: ${{ secrets.AWS_GITHUB_ROLE_ARN }}

      - name: Ensure GitHub Actions role supports long Terraform sessions
        run: |
          ROLE_ARN="${{ secrets.AWS_GITHUB_ROLE_ARN }}"
          ROLE_NAME="${ROLE_ARN##*/}"
          aws iam update-role \
            --role-name "${ROLE_NAME}" \
            --max-session-duration "${{ env.AWS_ROLE_DURATION_SECONDS }}"
          sleep 10

      - name: Configure AWS credentials (long Terraform session)
        uses: aws-actions/configure-aws-credentials@e3dd6a429d7300a6a4c196c26e071d42e0343502 # v4.0.2
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: ${{ secrets.AWS_GITHUB_ROLE_ARN }}
          role-duration-seconds: ${{ env.AWS_ROLE_DURATION_SECONDS }}

      - name: Terraform init
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: |
          terraform init -input=false \
            -backend-config="bucket=${{ vars.TF_STATE_BUCKET }}" \
            -backend-config="key=${{ env.TF_STATE_KEY }}" \
            -backend-config="region=${{ env.AWS_REGION }}" \
            -backend-config="use_lockfile=true" \
            -backend-config="encrypt=true"

      - name: Limpar secrets pendentes de deleção
        run: |
          set -euo pipefail

          secrets=(
            "fcg/prod/users-api"
            "fcg/prod/catalog-api"
            "fcg/prod/payments-api"
            "fcg/prod/notifications-api"
            "fcg/prod/rabbitmq"
            "fcg/prod/postgres-bootstrap"
          )

          for secret in "${secrets[@]}"; do
            deleted_date=$(aws secretsmanager describe-secret \
              --secret-id "${secret}" \
              --query "DeletedDate" \
              --output text 2>/dev/null || true)

            if [[ -n "${deleted_date}" && "${deleted_date}" != "None" ]]; then
              echo "Secret ${secret} está pendente de deleção. Removendo imediatamente para recriação pelo Terraform..."
              if ! aws secretsmanager delete-secret \
                --secret-id "${secret}" \
                --force-delete-without-recovery; then
                echo "Forçando recuperação temporária de ${secret} antes da remoção imediata..."
                aws secretsmanager restore-secret --secret-id "${secret}" || true
                aws secretsmanager delete-secret \
                  --secret-id "${secret}" \
                  --force-delete-without-recovery
              fi

              for attempt in {1..30}; do
                if aws secretsmanager describe-secret --secret-id "${secret}" >/dev/null 2>&1; then
                  sleep 2
                else
                  break
                fi
              done
            fi
          done

      - name: Terraform apply
        working-directory: ${{ env.TF_WORKING_DIR }}
        # -lock-timeout=10m: aguarda até 10 min se outro apply estiver rodando.
        # -parallelism=1: evita corrida entre Helm add-ons e webhooks recém-criados no EKS.
        # Não forçamos unlock aqui — o apply precisa gerenciar seu próprio lock.
        run: terraform apply -input=false -auto-approve -lock-timeout=10m -parallelism=1 -var-file=environments/prod.tfvars

      - name: Upload errored Terraform state
        if: failure()
        uses: actions/upload-artifact@4cec3d8aa04e39d1a68397de0c4cd6fb9dce8ec1 # v4.6.1
        with:
          name: terraform-errored-state
          path: ${{ env.TF_WORKING_DIR }}/errored.tfstate
          if-no-files-found: ignore

      - name: Capture Terraform outputs
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform output -json > "${GITHUB_WORKSPACE}/tf-outputs.json"

      - name: Render Helm values and Argo CD manifests
        env:
          GITOPS_REPO_URL: ${{ vars.GITOPS_REPO_URL }}
        run: bash scripts/render-values.sh tf-outputs.json

      - name: Commit rendered values back to master
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add deploy/helm/fcg-platform/values-prod.yaml gitops/argocd/fcg-platform-application.yaml gitops/argocd/fcg-platform-project.yaml
          if git diff --cached --quiet; then
            echo "No rendered changes to commit."
            exit 0
          fi
          git commit -m "ci(terraform): render values-prod.yaml and Argo CD manifests"
          git push

      # ----------------------------------------------------------------
      # Passo 03 — Registrar Argo CD Application no cluster (automatizado)
      # O Argo CD já foi instalado pelo eks_blueprints_addons.
      # Este step registra o AppProject e a Application que apontam para
      # este repositório, habilitando o GitOps automático.
      # ----------------------------------------------------------------
      - name: Conectar ao cluster EKS
        run: |
          aws eks update-kubeconfig \
            --region ${{ env.AWS_REGION }} \
            --name fcg-prod
          kubectl cluster-info

      - name: Aguardar Argo CD estar pronto
        run: |
          echo "Aguardando pods do Argo CD ficarem Running..."
          kubectl wait pod \
            --namespace argocd \
            --for=condition=Ready \
            --selector=app.kubernetes.io/part-of=argocd \
            --timeout=300s
          echo "✅ Argo CD está pronto."

      - name: Registrar AppProject e Application do Argo CD
        run: |
          echo "Aplicando AppProject..."
          kubectl apply -f gitops/argocd/fcg-platform-project.yaml

          echo "Aplicando Application..."
          kubectl apply -f gitops/argocd/fcg-platform-application.yaml

          echo ""
          echo "Status da Application:"
          kubectl -n argocd get application fcg-platform -o wide || true

          echo ""
          echo "✅ Argo CD registrado. Sincronizará automaticamente quando as imagens estiverem no ECR."
          echo "   Próximo passo: disparar workflow_dispatch em cada API para subir as primeiras imagens."
