{{- range $name, $service := .Values.services }}
{{- if $service.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $name }}
  labels:
    app.kubernetes.io/name: {{ $name }}
    {{- include "fcg-platform.labels" $ | nindent 4 }}
spec:
  replicas: {{ default 1 $service.replicaCount }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ $name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ $name }}
        {{- include "fcg-platform.labels" $ | nindent 8 }}
    spec:
      {{- if $service.serviceAccount }}
      serviceAccountName: {{ default $name $service.serviceAccount.name }}
      {{- end }}
      containers:
        - name: {{ $name }}
          image: "{{ $service.image.repository }}:{{ $service.image.tag }}"
          imagePullPolicy: {{ $.Values.global.imagePullPolicy }}
          ports:
            - containerPort: {{ $service.containerPort }}
              name: http
          {{- if or $service.env $service.secretRefs }}
          envFrom:
          {{- if $service.env }}
            - configMapRef:
                name: {{ $name }}-config
          {{- end }}
          {{- range $secretRef := $service.secretRefs }}
            - secretRef:
                name: {{ $secretRef }}
          {{- end }}
          {{- end }}
          {{- with $service.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with $service.readinessProbe }}
          readinessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with $service.livenessProbe }}
          livenessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
---
{{- end }}
{{- end }}
