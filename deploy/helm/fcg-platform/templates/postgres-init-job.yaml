{{- if .Values.global.postgresInit.enabled }}
apiVersion: batch/v1
kind: Job
metadata:
  name: postgres-bootstrap
  labels:
    app.kubernetes.io/name: postgres-bootstrap
    {{- include "fcg-platform.labels" . | nindent 4 }}
spec:
  backoffLimit: 6
  {{- with .Values.global.postgresInit.ttlSecondsAfterFinished }}
  ttlSecondsAfterFinished: {{ . }}
  {{- end }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: postgres-bootstrap
        {{- include "fcg-platform.labels" . | nindent 8 }}
    spec:
      restartPolicy: OnFailure
      containers:
        - name: postgres-bootstrap
          image: {{ .Values.global.postgresInit.image | quote }}
          imagePullPolicy: IfNotPresent
          envFrom:
            - secretRef:
                name: {{ .Values.global.postgresInit.secretName }}
          command:
            - /bin/sh
            - -ec
          args:
            - |
              export PGPASSWORD="${POSTGRES_ADMIN_PASSWORD}"
              psql_base="psql -v ON_ERROR_STOP=1 -h ${POSTGRES_HOST} -p ${POSTGRES_PORT} -U ${POSTGRES_ADMIN_USERNAME} -d ${POSTGRES_ADMIN_DATABASE}"

              create_role() {
                username="$1"
                password="$2"

                if [ "$($psql_base -tAc "SELECT 1 FROM pg_roles WHERE rolname='${username}'")" = "1" ]; then
                  $psql_base -c "ALTER USER \"${username}\" WITH PASSWORD '${password}'"
                else
                  $psql_base -c "CREATE USER \"${username}\" WITH PASSWORD '${password}'"
                fi
              }

              create_database() {
                database="$1"
                owner="$2"

                if [ "$($psql_base -tAc "SELECT 1 FROM pg_database WHERE datname='${database}'")" != "1" ]; then
                  $psql_base -c "CREATE DATABASE \"${database}\" OWNER \"${owner}\""
                fi

                $psql_base -c "ALTER DATABASE \"${database}\" OWNER TO \"${owner}\""
                $psql_base -c "GRANT ALL PRIVILEGES ON DATABASE \"${database}\" TO \"${owner}\""
              }

              create_role "${USERS_USERNAME}" "${USERS_PASSWORD}"
              create_database "${USERS_DATABASE}" "${USERS_USERNAME}"

              create_role "${CATALOG_USERNAME}" "${CATALOG_PASSWORD}"
              create_database "${CATALOG_DATABASE}" "${CATALOG_USERNAME}"
{{- end }}
