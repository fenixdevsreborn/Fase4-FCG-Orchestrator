{{- range $name, $service := .Values.services }}
{{- if and $service.enabled $service.serviceAccount $service.serviceAccount.create }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ default $name $service.serviceAccount.name }}
  labels:
    app.kubernetes.io/name: {{ $name }}
    {{- include "fcg-platform.labels" $ | nindent 4 }}
  {{- with $service.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
---
{{- end }}
{{- end }}
