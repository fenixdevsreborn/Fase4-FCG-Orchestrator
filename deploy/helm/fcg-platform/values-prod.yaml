# Placeholders (111111111111 e tag "initial") são substituídos automaticamente:
#  - account ID + IRSA ARN: pelo workflow .github/workflows/terraform-aws.yml (scripts/render-values.sh)
#  - tag de imagem: pelos workflows das APIs ao push em master (ECR + commit GitOps)
# Veja docs/DEPLOY-AUTOMATIC.md.

global:
  imagePullPolicy: IfNotPresent
  externalSecretStore:
    enabled: true
    name: aws-secretsmanager
    kind: ClusterSecretStore
    region: us-east-1
    serviceAccountRef:
      name: external-secrets-sa
      namespace: external-secrets

services:
  frontend-web:
    image:
      repository: 682839842435.dkr.ecr.us-east-1.amazonaws.com/frontend-web
      tag: "c6fefdf6a802"
    ingress:
      enabled: true
      className: alb
      annotations:
        alb.ingress.kubernetes.io/group.name: fcg-platform
        alb.ingress.kubernetes.io/group.order: "20"
        alb.ingress.kubernetes.io/scheme: internet-facing
        alb.ingress.kubernetes.io/target-type: ip
        alb.ingress.kubernetes.io/healthcheck-path: /health
        alb.ingress.kubernetes.io/listen-ports: '[{"HTTP":80}]'
      hosts:
        - host: ""
          paths:
            - path: /
              pathType: Prefix

  gateway:
    image:
      repository: 682839842435.dkr.ecr.us-east-1.amazonaws.com/gateway-api
      tag: "a27bb34b884c"
    ingress:
      enabled: true
      className: alb
      annotations:
        alb.ingress.kubernetes.io/group.name: fcg-platform
        alb.ingress.kubernetes.io/group.order: "10"
        alb.ingress.kubernetes.io/scheme: internet-facing
        alb.ingress.kubernetes.io/target-type: ip
        alb.ingress.kubernetes.io/healthcheck-path: /health
        alb.ingress.kubernetes.io/listen-ports: '[{"HTTP":80}]'
      hosts:
        - host: ""
          paths:
            - path: /api
              pathType: Prefix
            - path: /swagger
              pathType: Prefix
            - path: /docs
              pathType: Prefix
            - path: /health
              pathType: Prefix

  users-api:
    image:
      repository: 682839842435.dkr.ecr.us-east-1.amazonaws.com/users-api
      tag: "010e49106e20"

  catalog-api:
    image:
      repository: 682839842435.dkr.ecr.us-east-1.amazonaws.com/catalog-api
      tag: "1827409dd158"
    serviceAccount:
      create: true
      name: catalog-api
      annotations:
        eks.amazonaws.com/role-arn: arn:aws:iam::682839842435:role/fcg-prod-catalog-irsa

  payments-api:
    image:
      repository: 682839842435.dkr.ecr.us-east-1.amazonaws.com/payments-api
      tag: "a43d239bf48d"

  notifications-api:
    image:
      repository: 682839842435.dkr.ecr.us-east-1.amazonaws.com/notifications-api
      tag: "e1ad47980929"
