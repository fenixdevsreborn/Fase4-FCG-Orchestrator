apiVersion: apps/v1
kind: Deployment
metadata:
  name: catalog-api
  namespace: fiap-gamestore
  labels:
    app: catalog-api
    component: api
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: catalog-api
  template:
    metadata:
      labels:
        app: catalog-api
        component: api
    spec:
      containers:
      - name: catalog-api
        image: catalogapi:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8080
          name: http
        env:
        - name: ASPNETCORE_ENVIRONMENT
          valueFrom:
            configMapKeyRef:
              name: catalog-api-config
              key: ASPNETCORE_ENVIRONMENT
        - name: ASPNETCORE_URLS
          valueFrom:
            configMapKeyRef:
              name: catalog-api-config
              key: ASPNETCORE_URLS
        - name: ConnectionStrings__CatalogDatabase
          valueFrom:
            secretKeyRef:
              name: catalog-api-secret
              key: postgres-connection-string
        - name: RabbitMQ__Host
          valueFrom:
            configMapKeyRef:
              name: catalog-api-config
              key: RabbitMQ__Host
        - name: RabbitMQ__Port
          valueFrom:
            configMapKeyRef:
              name: catalog-api-config
              key: RabbitMQ__Port
        - name: RabbitMQ__Username
          valueFrom:
            secretKeyRef:
              name: catalog-api-secret
              key: rabbitmq-username
        - name: RabbitMQ__Password
          valueFrom:
            secretKeyRef:
              name: catalog-api-secret
              key: rabbitmq-password
        - name: RabbitMQ__Exchange
          valueFrom:
            configMapKeyRef:
              name: catalog-api-config
              key: RabbitMQ__Exchange
        - name: Jwt__Key
          valueFrom:
            secretKeyRef:
              name: catalog-api-secret
              key: Jwt__Key
        - name: Jwt__Issuer
          valueFrom:
            configMapKeyRef:
              name: catalog-api-config
              key: Jwt__Issuer
        - name: Jwt__Audience
          valueFrom:
            configMapKeyRef:
              name: catalog-api-config
              key: Jwt__Audience
        - name: Serilog__MinimumLevel__Default
          valueFrom:
            configMapKeyRef:
              name: catalog-api-config
              key: Serilog__MinimumLevel__Default
        - name: Serilog__MinimumLevel__Override__Microsoft
          valueFrom:
            configMapKeyRef:
              name: catalog-api-config
              key: Serilog__MinimumLevel__Override__Microsoft
        - name: Serilog__MinimumLevel__Override__System
          valueFrom:
            configMapKeyRef:
              name: catalog-api-config
              key: Serilog__MinimumLevel__Override__System
        resources:
          requests:
            cpu: 500m
            memory: 512Mi
          limits:
            cpu: 1000m
            memory: 1Gi
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 60
          periodSeconds: 30
          timeoutSeconds: 10
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        securityContext:
          allowPrivilegeEscalation: false
          runAsNonRoot: true
          runAsUser: 1000
          capabilities:
            drop:
            - ALL
      # Aguardar PostgreSQL e RabbitMQ estarem prontos
      initContainers:
      - name: wait-for-postgres
        image: postgres:16-alpine
        command:
        - sh
        - -c
        - |
          until pg_isready -h postgres-catalog-service -p 5432 -U admin; do
            echo "Waiting for postgres-catalog-service..."
            sleep 2
          done
      - name: wait-for-rabbitmq
        image: busybox:1.36
        command:
        - sh
        - -c
        - |
          until nc -z rabbitmq-service 5672; do
            echo "Waiting for rabbitmq-service..."
            sleep 2
          done
          echo "RabbitMQ is ready!"
