apiVersion: v1
kind: Service
metadata:
  name: catalog-api-swagger
  namespace: fiap-gamestore
  labels:
    app: catalog-api
    component: api
    service-type: external
spec:
  type: NodePort
  ports:
  - port: 8080
    targetPort: 8080
    protocol: TCP
    name: http
    nodePort: 30081
  selector:
    app: catalog-api
