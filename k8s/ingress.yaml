apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: fiap-gamestore-ingress
  namespace: fiap-gamestore
  labels:
    app: fiap-gamestore
  annotations:
    # Ajuste conforme seu Ingress Controller
    # Para NGINX Ingress Controller:
    # nginx.ingress.kubernetes.io/rewrite-target: /
    # Para Traefik:
    # traefik.ingress.kubernetes.io/rule-type: PathPrefix
spec:
  # Ajuste conforme seu Ingress Controller
  # ingressClassName: nginx  # Para NGINX
  # ingressClassName: traefik  # Para Traefik
  rules:
  - host: fiap-gamestore.local  # Ajuste conforme necessário
    http:
      paths:
      # Gateway API - Roteia tudo através do Gateway (incluindo Swagger)
      - path: /
        pathType: Prefix
        backend:
          service:
            name: gateway-api-service
            port:
              number: 8080
      # RabbitMQ Management UI (mantido separado)
      - path: /rabbitmq
        pathType: Prefix
        backend:
          service:
            name: rabbitmq-service
            port:
              number: 15672
